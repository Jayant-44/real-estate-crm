<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agnayi | Add New Lead</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans">

    <nav class="bg-white border-b border-gray-200 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="hover:opacity-80 transition">
                <h1 class="text-xl font-bold text-blue-900">AGNAYI</h1>
            </a>
            <a href="/dashboard/leads" class="text-sm font-medium text-gray-600 hover:text-blue-600">Cancel & Go Back</a>
        </div>
    </nav>

    <div class="container mx-auto mt-12 px-4 max-w-2xl">
        <div class="bg-white rounded-3xl shadow-2xl p-8 border border-gray-100">
            <div class="text-center mb-10">
                <div class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-user-plus text-blue-600 text-2xl"></i>
                </div>
                <h2 class="text-3xl font-extrabold text-gray-800">Capture New Lead</h2>
                <p class="text-gray-500 mt-2">Data will be synced to MySQL and n8n automatically.</p>
            </div>

            <form action="/api/leads" method="POST" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Full Name</label>
                        <input type="text" name="name" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="e.g. Jayant">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Phone Number</label>
                        <input type="text" name="phone" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="+91...">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Email Address</label>
                    <input type="email" name="email" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="client@gmail.com">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Budget (INR)</label>
                    <input type="number" name="budget" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="7500000">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Requirements</label>
                    <textarea name="preferences" rows="3" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Interested in 3BHK..."></textarea>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 transition transform active:scale-95">
                    Save Lead & Trigger Automation
                </button>
            </form>
        </div>
    </div>

</body>
</html>
