<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agnayi | Add Property</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="/" class="hover:opacity-80 transition">
                <h1 class="text-xl font-bold tracking-tight text-slate-800">AGNAYI</h1>
            </a>
            <a href="/dashboard/properties" class="text-sm font-medium text-slate-600 hover:text-purple-600">Cancel & Go Back</a>
        </div>
    </nav>

    <div class="container mx-auto mt-12 px-4 max-w-2xl mb-12">
        <div class="bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
            <div class="text-center mb-10">
                <div class="bg-purple-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-building text-purple-600 text-2xl"></i>
                </div>
                <h2 class="text-3xl font-extrabold text-slate-800">Add New Property</h2>
                <p class="text-slate-500 mt-2">Expand your inventory. Data syncs directly to MySQL.</p>
            </div>

            <form action="/api/properties" method="POST" enctype="multipart/form-data" class="space-y-6">
                
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Property Image</label>
                    <input type="file" name="image" accept="image/*" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-purple-500 outline-none transition file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-purple-50 file:text-purple-700 hover:file:bg-purple-100">
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Property Title <span class="text-red-500">*</span></label>
                    <input type="text" name="title" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-purple-500 outline-none transition" placeholder="e.g. Modern Glass Office Park">
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Location <span class="text-red-500">*</span></label>
                    <input type="text" name="location" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-purple-500 outline-none transition" placeholder="e.g. Cyber City, Gurugram">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Price (INR) <span class="text-red-500">*</span></label>
                        <input type="number" name="price" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-purple-500 outline-none transition" placeholder="15000000">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Size (Sq. Ft.)</label>
                        <input type="number" name="size_sqft" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-purple-500 outline-none transition" placeholder="2500">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Amenities</label>
                    <textarea name="amenities" rows="3" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-purple-500 outline-none transition" placeholder="High-speed internet, cafeteria, dedicated parking..."></textarea>
                </div>

                <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-purple-200 transition transform active:scale-95">
                    Save to Inventory
                </button>
            </form>
        </div>
    </div>

</body>
</html>
